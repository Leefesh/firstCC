<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>去哪儿玩 - 旅游推荐</title>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            color: #2d3436;
            line-height: 1.6;
        }

        /* ===== Hero ===== */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 40%, #2d1b4e 70%, #1a2a3a 100%);
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
            top: -200px; right: -200px;
            animation: float 8s ease-in-out infinite;
        }
        .hero::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(236,72,153,0.1) 0%, transparent 70%);
            bottom: -200px; left: -150px;
            animation: float 10s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        .hero-content { position: relative; z-index: 1; padding: 2rem; }
        .hero h1 {
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 800;
            color: #fff;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }
        .hero h1 span {
            background: linear-gradient(135deg, #667eea 0%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: rgba(255,255,255,0.7);
            max-width: 600px;
            margin: 0 auto 2.5rem;
        }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 36px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 8px 30px rgba(102,126,234,0.4);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(102,126,234,0.5); }
        .btn-outline {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .btn-outline:hover { border-color: #667eea; background: rgba(102,126,234,0.1); }
        .btn-secondary {
            background: #fff;
            color: #2d3436;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .hero-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

        /* ===== Scroll indicator ===== */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            animation: bounce 2s infinite;
        }
        .scroll-indicator .arrow { width: 24px; height: 24px; border-right: 2px solid; border-bottom: 2px solid; transform: rotate(45deg); opacity: 0.4; }
        @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(10px); } }

        /* ===== Section ===== */
        .section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 24px;
        }
        .section-title {
            text-align: center;
            margin-bottom: 3rem;
        }
        .section-title h2 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .section-title p {
            color: #636e72;
            font-size: 1.05rem;
        }

        /* ===== Random Pick ===== */
        #random-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            max-width: none;
            padding: 80px 24px;
        }
        #random-section .section-title h2,
        #random-section .section-title p { color: #fff; }

        .random-box {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 3rem 2rem;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .random-box .shake-btn {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: none;
            background: #fff;
            color: #667eea;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        .random-box .shake-btn:hover { transform: scale(1.05); }
        .random-box .shake-btn:active { transform: scale(0.95); }
        .random-box .shake-btn.spinning { animation: spin 0.6s ease-in-out 3; }
        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(15deg) scale(1.1); }
            75% { transform: rotate(-15deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }

        .random-result {
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .random-result .place { font-size: 1.8rem; font-weight: 700; color: #fff; margin-bottom: 0.3rem; }
        .random-result .desc { color: rgba(255,255,255,0.8); font-size: 1rem; }
        .random-result .tag {
            display: inline-block;
            padding: 4px 14px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #fff;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        /* ===== Category Filter ===== */
        .categories {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
        }
        .category-btn {
            padding: 10px 24px;
            border: 2px solid #dfe6e9;
            border-radius: 50px;
            background: #fff;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            color: #636e72;
        }
        .category-btn:hover { border-color: #667eea; color: #667eea; }
        .category-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }

        /* ===== Destination Cards ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            transition: all 0.4s ease;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.5s ease forwards;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 40px rgba(0,0,0,0.12); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .card-img {
            width: 100%; height: 200px;
            object-fit: cover;
            display: block;
            background: #dfe6e9;
        }
        .card-body { padding: 18px 20px 22px; }
        .card-body .name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .card-body .location {
            color: #636e72;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .card-body .location::before { content: '📍 '; }
        .card-body .brief {
            color: #636e72;
            font-size: 0.9rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }
        .card-footer .tag {
            padding: 3px 12px;
            background: #f0f0ff;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #667eea;
        }
        .card-footer .rating { color: #f39c12; font-size: 0.9rem; }

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff;
            border-radius: 24px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-img {
            width: 100%; height: 300px;
            object-fit: cover;
            display: block;
            background: #dfe6e9;
        }
        .modal-body { padding: 28px; }
        .modal-body .name { font-size: 1.8rem; font-weight: 700; }
        .modal-body .location { color: #636e72; margin: 4px 0 12px; }
        .modal-body .location::before { content: '📍 '; }
        .modal-body .desc { font-size: 1rem; color: #2d3436; line-height: 1.8; margin-bottom: 1.2rem; }
        .modal-body .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }
        .modal-body .info-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .modal-body .info-item .label { font-size: 0.8rem; color: #636e72; }
        .modal-body .info-item .value { font-size: 1rem; font-weight: 600; margin-top: 2px; }
        .modal-body .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        .modal-body .tag-list span {
            padding: 5px 14px;
            background: #f0f0ff;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #667eea;
        }
        .modal-close {
            position: absolute;
            top: 16px; right: 16px;
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .modal-close:hover { background: rgba(0,0,0,0.7); }
        .modal-img-wrap { position: relative; }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            padding: 40px 24px;
            color: #636e72;
            font-size: 0.9rem;
        }
        footer a { color: #667eea; text-decoration: none; }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .section { padding: 50px 16px; }
            #random-section { padding: 50px 16px; }
            .modal-body { padding: 20px; }
            .modal-img { height: 200px; }
            .hero-btns .btn { padding: 12px 24px; font-size: 1rem; }
        }

        /* ===== No results ===== */
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #636e72;
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

<!-- ===== Hero ===== -->
<section class="hero">
    <div class="hero-content">
        <h1>去<span>哪儿</span>玩</h1>
        <p>世界这么大，总有一个地方在等你。不知道去哪？让我们的推荐帮你找到下一段旅程。</p>
        <div class="hero-btns">
            <a href="#random-section" class="btn btn-primary">🎲 随机推荐</a>

        <button class="category-btn" data-cat="美食">🍜 美食</button>
    </div>

    <div class="grid" id="destinationGrid"></div>
</section>

<!-- ===== Modal ===== -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-img-wrap">
            <img class="modal-img" id="modalImg" src="" alt="" />
            <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-body">
            <div class="name" id="modalName"></div>
            <div class="location" id="modalLocation"></div>
            <div class="desc" id="modalDesc"></div>
            <div class="info-grid" id="modalInfo"></div>
            <div class="tag-list" id="modalTags"></div>
        </div>
    </div>
</div>

<!-- ===== Footer ===== -->
<footer>
    <p>去哪儿玩 · 旅游推荐 · 世界那么大，一起去看看</p>
</footer>

    // ===== Render Grid =====
    const grid = document.getElementById('destinationGrid');
    const categoryBtns = document.querySelectorAll('.category-btn');
    let currentCat = 'all';

    function renderGrid(cat) {
        const filtered = cat === 'all'
            ? destinations
            : destinations.filter(d => d.category === cat);

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-results">没有找到匹配的目的地 🤔</div>';
            return;
        }

        grid.innerHTML = filtered.map((d, i) => `
            <div class="card" style="animation-delay:${i*0.05}s" data-id="${d.id}">
                <img class="card-img" src="${d.image}" alt="${d.name}" loading="lazy"
                     onerror="this.style.display='none'" />
                <div class="card-body">
                    <div class="name">${d.name}</div>
                    <div class="location">${d.location}</div>
                    <div class="brief">${d.brief}</div>
                    <div class="card-footer">
                        <span class="tag">${d.category}</span>
                        <span class="rating">★ ${d.rating}</span>
                    </div>
                </div>
            </div>
        `).join('');

        // Click to open modal
        grid.querySelectorAll('.card').forEach(el => {
            el.addEventListener('click', () => {
                const id = parseInt(el.dataset.id);
                const dest = destinations.find(d => d.id === id);
                if (dest) openModal(dest);
            });
        });
    }

    // ===== Category Filter =====
    categoryBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            categoryBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCat = btn.dataset.cat;
            renderGrid(currentCat);
        });
    });

    // ===== Random Pick =====
    const shakeBtn = document.getElementById('shakeBtn');
    const randomResult = document.getElementById('randomResult');

    shakeBtn.addEventListener('click', () => {
        shakeBtn.classList.remove('spinning');
        // force reflow
        void shakeBtn.offsetWidth;
        shakeBtn.classList.add('spinning');

        setTimeout(() => {
            const pick = destinations[Math.floor(Math.random() * destinations.length)];
            randomResult.innerHTML = `
                <div class="place">${pick.name}</div>
                <div class="desc">${pick.brief}</div>
                <span class="tag">${pick.location} · ${pick.category} · ★ ${pick.rating}</span>
            `;
            shakeBtn.classList.remove('spinning');
        }, 600);
    });

    // ===== Modal =====
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modalImg');
    const modalName = document.getElementById('modalName');
    const modalLocation = document.getElementById('modalLocation');
    const modalDesc = document.getElementById('modalDesc');
    const modalInfo = document.getElementById('modalInfo');
    const modalTags = document.getElementById('modalTags');

    function openModal(d) {
        modalImg.src = d.image;
        modalImg.alt = d.name;
        modalName.textContent = d.name;
        modalLocation.textContent = d.location;
        modalDesc.textContent = d.desc;
        modalInfo.innerHTML = `
            <div class="info-item"><div class="label">最佳季节</div><div class="value">${d.bestTime}</div></div>
            <div class="info-item"><div class="label">建议天数</div><div class="value">${d.days}</div></div>
            <div class="info-item"><div class="label">预算</div><div class="value">${d.budget}</div></div>
            <div class="info-item"><div class="label">评分</div><div class="value">★ ${d.rating}</div></div>
        `;
        modalTags.innerHTML = d.tags.map(t => `<span>#${t}</span>`).join('');
        modal.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modal.classList.remove('open');
        document.body.style.overflow = '';
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // ===== Init =====
    renderGrid('all');
</script>
